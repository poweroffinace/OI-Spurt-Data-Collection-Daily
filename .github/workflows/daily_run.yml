name: NSE OI Data Daily Sync

on:
  schedule:
    # 9:00 PM IST is 3:30 PM UTC
    - cron: '30 15 * * *'
  workflow_dispatch: # Allows you to run it manually to test

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to save the CSVs back to your repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas requests

      - name: Run data collection script
        run: python "oi-spurt-data-collection.py" # Ensure this matches your filename exactly

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/*.csv
          git commit -m "Automated Data Update: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
